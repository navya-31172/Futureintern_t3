<!DOCTYPE html>
<html>
<head>
<title>Business</title>

<style>
body { font-family:'Segoe UI'; background:#1e293b; color:white; text-align:center; }
.menu { display:flex; justify-content:center; gap:20px; margin-top:20px; }
.item { background:#334155; padding:20px; border-radius:10px; }
button { padding:10px; margin-top:10px; cursor:pointer; }
</style>

</head>
<body>

<h1>My Cafe</h1>
<p>Fresh & Tasty</p>

<h2>Menu</h2>
<div class="menu">
  <div class="item">
    Coffee ₹100<br>
    <button onclick="order('Coffee')">Order</button>
  </div>
  <div class="item">
    Tea ₹50<br>
    <button onclick="order('Tea')">Order</button>
  </div>
</div>

<h3 id="msg"></h3>

<script>
function order(item) {
  document.getElementById("msg").innerText = item + " ordered successfully!";
}
</script>

</body>
</html>
